    // 格式範例： "[漢字|かんじ]"
    const renderRuby = (text) => {
      if (!text) return null;
      const regex = /\[([^|\]]+)\|([^\]]+)\]/g;
      const parts = [];
      let lastIndex = 0;
      let match;

      while ((match = regex.exec(text)) !== null) {
        if (match.index > lastIndex) {
          parts.push(<span key={`text-${lastIndex}`}>{text.substring(lastIndex, match.index)}</span>);
        }
        parts.push(
          <ruby key={`ruby-${match.index}`} className="mx-[2px]">
            {match[1]}
            <rt className="text-[0.65em] text-pink-500 font-bold tracking-tighter">{match[2]}</rt>
          </ruby>
        );
        lastIndex = regex.lastIndex;
      }
      if (lastIndex < text.length) {
        parts.push(<span key={`text-${lastIndex}`}>{text.substring(lastIndex)}</span>);
      }
      return parts;
    };

          { speaker: '顧客', text: '[東京|とうきょう]タワーへの[行|い]き[方|かた]を[教|おし]えてください。', cn: '請告訴我怎麼去東京鐵塔。' },
          { speaker: '店員', text: '[地下鉄|ちかてつ]に[乗|の]って、[次|つぎ]の[駅|えき]で[降|お]ります。', cn: '搭乘地下鐵，在下一站下車。' }
        ],
        vocab: { jp: '[降|お]りる', cn: '下車', exJp: 'バスを[降|お]ります。', exCn: '下公車。' },
        grammar: { jp: '〜への[行|い]き[方|かた]', cn: '去～的方法', exJp: '[空港|くうこう]への[行|い]き[方|かた]を[調|しら]べます。', exCn: '查去機場的方法。' },
        practice: { cn: '請告訴我怎麼去飯店。', before: 'ホテル', answer: 'への[行|い]き[方|かた]', after: 'を[教|おし]えてください。' }
      },
      {
        type: 'travel', chapter: 2, title: '東京旅遊：車票精算',
        dialogue: [
          { speaker: '顧客', text: '[残高不足|ざんだかぶそく]で[改札|かいさつ]を[出|で]られません。', cn: '因為餘額不足，我出不了剪票口。' },
          { speaker: '店員', text: 'あちらの[精算機|せいさんき]でチャージするか、[乗|の]り[越|こ]し[精算|せいさん]をしてください。', cn: '請去那邊的精算機加值，或是進行補票。' }
        ],
        vocab: { jp: '[精算|せいさん]', cn: '補票 / 結算', exJp: 'レジで[料金|りょうきん]を[精算|せいさん]します。', exCn: '在收銀台結算費用。' },
        grammar: { jp: '〜か、〜か', cn: '或者是～，或者是～', exJp: '[電車|でんしゃ]で[行|い]くか、バスで[行|い]くか迷います。', exCn: '正在猶豫要搭電車去還是搭公車去。' },
        practice: { cn: '用現金付款，還是用信用卡付款？', before: '[現金|げんきん]で[払|はら]う', answer: 'か、', after: 'カードで[払|はら]うか。' }
      },
      {
        type: 'travel', chapter: 2, title: '東京旅遊：飯店入住',
        dialogue: [
          { speaker: '顧客', text: 'チェックインをお[願|ねが]いします。[予約|よやく]した[李|り]です。', cn: '麻煩辦理入住。我是預約的李。' },
          { speaker: '店員', text: '[李様|りさま]ですね。パスポートのコピーを[取|と]らせてください。', cn: '是李先生/小姐呢。請讓我影印護照。' }
        ],
        vocab: { jp: '[予約|よやく]', cn: '預約', exJp: 'レストランを[予約|よやく]しました。', exCn: '預約了餐廳。' },
        grammar: { jp: '〜た＋[名詞|めいし]', cn: '動詞過去式修飾名詞', exJp: '[昨日買|きのうか]った[本|ほん]。', exCn: '昨天買的書。' },
        practice: { cn: '這是我昨天做的蛋糕。', before: 'これは[昨日|きのう]', answer: '[作|つく]った', after: 'ケーキです。' }
      },
      {
        type: 'travel', chapter: 2, title: '東京旅遊：寄放行李',
        dialogue: [
          { speaker: '顧客', text: '[荷物|にもつ]を[預|あず]かってもらえませんか。', cn: '可以幫我保管行李嗎？' },
          { speaker: '店員', text: 'はい、フロントでお[預|あず]かりします。', cn: '可以，在櫃檯為您保管。' }
        ],
        vocab: { jp: '[預|あず]かる', cn: '保管、代存', exJp: 'コートをお[預|あず]かりします。', exCn: '為您保管外套。' },
        grammar: { jp: '〜てもらえませんか', cn: '能請您幫我～嗎？', exJp: '[写真|しゃしん]を[撮|と]ってもらえませんか。', exCn: '能請您幫我拍照嗎？' },
        practice: { cn: '能請您在地圖上畫出來嗎？', before: '[地図|ちず]に[書|か]いて', answer: 'もらえませんか', after: '。' }
      },
      {
        type: 'travel', chapter: 2, title: '東京旅遊：飯店設施',
        dialogue: [
          { speaker: '顧客', text: '[貸切風呂|かしきりぶろ]を[利用|りよう]したいのですが、[予約|よやく]は[必要|ひつよう]ですか。', cn: '我想使用個人包場浴池，需要預約嗎？' },
          { speaker: '店員', text: '[空|あ]き[次第|しだい]のご[案内|あんない]となりますので、お[部屋|へや]でお[待|ま]ちください。', cn: '一有空位就會馬上為您帶位，請在房間內稍候。' }
        ],
        vocab: { jp: '[貸切|かしきり]', cn: '包場 / 私人專用', exJp: 'レストランを[貸切|かしきり]にしてパーティーをする。', exCn: '包下餐廳辦派對。' },
        grammar: { jp: '〜[次第|しだい]', cn: '一～就立刻～', exJp: '[到着|とうちゃく]し[次第|しだい]、[連絡|れんらく]します。', exCn: '一抵達就會立刻聯絡。' },
        practice: { cn: '房間準備好之後，會馬上通知您。', before: 'お[部屋|へや]の[準備|じゅんび]ができ', answer: '[次第|しだい]', after: '、お[知|し]らせします。' }
      }
    ];

    function App() {
      const [page, setPage] = useState(1);
      const [showAnswer, setShowAnswer] = useState(false);

      useEffect(() => {
        setShowAnswer(false);
      }, [page]);

      const totalPages = pagesData.length;
      const currentPageData = pagesData[page - 1];

      const handleNext = () => setPage((p) => Math.min(p + 1, totalPages));
      const handlePrev = () => setPage((p) => Math.max(p - 1, 1));
      const toggleAnswer = () => setShowAnswer((prev) => !prev);

      // 渲染單字學習頁面 (米相關) - 全新一組兩單字配一例句排版
      const renderRicePage = (data) => (
        <div className="flex flex-col items-center justify-center h-full space-y-6">
          <div className="bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-sm border-2 border-pink-200 w-full max-w-3xl">
            <ul className="space-y-4">
              {data.groups.map((group, idx) => (
                <li key={idx} className="flex flex-col p-5 bg-pink-50/90 rounded-2xl hover:bg-pink-100 transition-colors border border-pink-100 shadow-sm">
                  <div className="flex justify-around mb-4 border-b-2 border-pink-200 border-dashed pb-4">
                    {group.words.map((w, i) => (
                      <div key={i} className="flex flex-col items-center w-1/2">
                        <span className="text-3xl font-extrabold text-pink-900 mb-2 drop-shadow-sm">{renderRuby(w.jp)}</span>
                        <span className="text-xl font-bold text-pink-700">{w.cn}</span>
                      </div>
                    ))}
                  </div>
                  <div className="text-center px-4">
                    <div className="text-xl md:text-2xl font-bold text-pink-800 mb-2 leading-relaxed">{renderRuby(group.sentenceJp)}</div>
                    <div className="text-lg font-bold text-pink-600/90">{group.sentenceCn}</div>
                  </div>
                </li>
              ))}
            </ul>
          </div>
        </div>
      );

      // 渲染旅遊會話頁面
      const renderTravelPage = (data) => (
        <div className="flex flex-col h-full space-y-4">
          
          {/* 上方會話區塊 */}
          <div className="bg-white/95 p-6 rounded-3xl shadow-sm border-2 border-pink-100 flex flex-col space-y-4">
            <h3 className="text-pink-500 font-extrabold text-xl mb-2 flex items-center">
              <span className="text-2xl mr-2">🌸</span> 情境對話
            </h3>
            {data.dialogue.map((line, idx) => {
              const isCustomer = line.speaker === '顧客';
              return (
                <div key={idx} className={`flex w-full ${isCustomer ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[85%] rounded-3xl px-6 py-4 shadow-sm ${
                    isCustomer 
                      ? 'bg-white border-2 border-pink-300 text-pink-900 rounded-tr-md' 
                      : 'bg-pink-100 border-2 border-pink-100 text-pink-900 rounded-tl-md'
                  }`}>
                    <div className="text-sm font-extrabold text-pink-500 mb-2">{line.speaker}</div>
                    <div className="text-2xl font-bold mb-2 leading-relaxed">{renderRuby(line.text)}</div>
                    <div className="text-lg font-bold text-pink-600/90">{line.cn}</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* 中間學習區塊 (單字與文法) */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 flex-grow">
            <div className="bg-white/95 p-6 rounded-3xl shadow-sm border-2 border-pink-100 flex flex-col justify-center">
              <h4 className="text-pink-500 font-extrabold text-lg mb-4 border-b-2 border-pink-100 pb-2">✨ 新出單字</h4>
              <div className="text-3xl font-extrabold text-pink-900 mb-2">{renderRuby(data.vocab.jp)}</div>
              <div className="text-xl text-pink-700 font-bold mb-5">{data.vocab.cn}</div>
              <div className="bg-pink-50 p-4 rounded-2xl">
                <div className="text-xl font-bold text-pink-900 mb-2">{renderRuby(data.vocab.exJp)}</div>
                <div className="text-md font-bold text-pink-500">{data.vocab.exCn}</div>
              </div>
            </div>

            <div className="bg-white/95 p-6 rounded-3xl shadow-sm border-2 border-pink-100 flex flex-col justify-center">
              <h4 className="text-pink-500 font-extrabold text-lg mb-4 border-b-2 border-pink-100 pb-2">📖 文法句式</h4>
              <div className="text-2xl font-extrabold text-pink-900 mb-2">{renderRuby(data.grammar.jp)}</div>
              <div className="text-xl text-pink-700 font-bold mb-5">{data.grammar.cn}</div>
              <div className="bg-pink-50 p-4 rounded-2xl">
                <div className="text-xl font-bold text-pink-900 mb-2">{renderRuby(data.grammar.exJp)}</div>
                <div className="text-md font-bold text-pink-500">{data.grammar.exCn}</div>
              </div>
            </div>
          </div>

          {/* 下方翻譯練習區塊 */}
          <div className="bg-pink-100/70 p-6 rounded-3xl border-2 border-pink-300 flex flex-col items-center justify-center text-center shadow-inner">
            <h4 className="text-pink-600 font-extrabold text-lg mb-3">✍️ 翻譯練習</h4>
            <div className="text-xl font-bold text-pink-800 mb-5">{data.practice.cn}</div>
            <div className="text-2xl font-bold text-pink-900 flex flex-wrap justify-center items-end leading-loose">
              <span>{renderRuby(data.practice.before)}</span>
              
              <button 
                onClick={toggleAnswer}
                className="mx-3 inline-flex items-center justify-center min-w-[100px] border-b-4 border-pink-400 bg-white cursor-pointer px-4 py-2 rounded-xl hover:bg-pink-50 hover:-translate-y-1 transition-all shadow-md focus:outline-none"
                title="點擊顯示解答"
              >
                {showAnswer ? (
                  <span className="text-pink-600 font-extrabold animate-pulse">{renderRuby(data.practice.answer)}</span>
                ) : (
                  <span className="text-pink-300 text-lg font-bold select-none">點擊解答</span>
                )}
              </button>
              
              <span>{renderRuby(data.practice.after)}</span>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-4xl mx-auto h-full flex flex-col">
            
            {/* 標頭 */}
            <header className="flex justify-between items-center mb-6 bg-white/90 p-5 rounded-3xl shadow-sm border-2 border-pink-200 backdrop-blur-md">
              <h1 className="text-2xl md:text-3xl font-extrabold text-pink-600 tracking-wide flex items-center">
                <span className="mr-3 text-3xl">🌸</span> 初階日語綜合練習
              </h1>
              <div className="text-pink-600 font-extrabold bg-pink-100 px-5 py-2 rounded-full text-md shadow-sm border border-pink-200">
                第 {page} 頁 / 共 {totalPages} 頁
              </div>
            </header>

            {/* 內容區塊 */}
            <main className="flex-grow flex flex-col">
              <h2 className="text-center text-xl md:text-2xl font-extrabold text-pink-800 mb-6 drop-shadow-sm tracking-wide">
                {currentPageData.chapter === 1 ? '第一章' : '第二章'}：{currentPageData.title}
              </h2>
              
              <div className="flex-grow">
                {currentPageData.type === 'rice' 
                  ? renderRicePage(currentPageData) 
                  : renderTravelPage(currentPageData)}
              </div>
            </main>

            {/* 控制按鈕 */}
            <footer className="mt-8 flex justify-between items-center bg-white/80 p-5 rounded-3xl shadow-sm border border-pink-100">
              <button
                onClick={handlePrev}
                disabled={page === 1}
                className={`px-8 py-4 rounded-full font-extrabold text-xl shadow-sm transition-all ${
                  page === 1 
                    ? 'bg-gray-100 text-gray-300 cursor-not-allowed' 
                    : 'bg-white border-2 border-pink-300 text-pink-600 hover:bg-pink-100 hover:shadow-md active:scale-95'
                }`}
              >
                上一頁
              </button>
              
              <button
                onClick={handleNext}
                disabled={page === totalPages}
                className={`px-8 py-4 rounded-full font-extrabold text-xl shadow-md transition-all ${
                  page === totalPages 
                    ? 'bg-gray-100 text-gray-300 cursor-not-allowed' 
                    : 'bg-pink-400 text-white border-2 border-pink-400 hover:bg-pink-500 hover:border-pink-500 hover:shadow-lg active:scale-95'
                }`}
              >
                下一頁
              </button>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
